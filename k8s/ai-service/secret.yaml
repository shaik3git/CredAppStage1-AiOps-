# =====================================================================
# CredAI Service credentials  ***EXAMPLE ONLY - DO NOT COMMIT REAL VALUES***
# =====================================================================
# This file documents the shape of the Secret the ai-service Pod expects.
# Do NOT put a real API key here or commit one to git - this project's
# azure-pipelines.yml is intentionally NOT modified to create this Secret
# automatically (per this phase's constraints), so it must be created
# out-of-band, once, exactly like credpay-db's real Secret already is:
#
#   kubectl create secret generic credai-secrets \
#     --namespace credpay \
#     --from-literal=OPENAI_ENDPOINT="https://<your-resource>.services.ai.azure.com/api/projects/<your-project>/openai/v1/responses" \
#     --from-literal=OPENAI_KEY="<your-azure-openai-key>" \
#     --from-literal=OPENAI_DEPLOYMENT="<your-deployment-name>" \
#     --from-literal=OPENAI_API_VERSION="2025-08-07" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The four AZURE_* fields and LOG_ANALYTICS_WORKSPACE_ID/AKS_RESOURCE_ID
# are OPTIONAL - only needed if you want the Azure Monitor / Log
# Analytics clients enabled (see ai-service/docs/Architecture.md,
# "Graceful degradation"). Omit them entirely to leave those two clients
# disabled; the service starts and runs normally either way.
#
# This is a plain Kubernetes Secret - same trust model as credpay-db.
# No CSI driver, no Workload Identity. The stringData values below are
# placeholders for illustration only.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: credai-secrets
  namespace: credpay
  labels:
    app.kubernetes.io/name: credai-service
    app.kubernetes.io/part-of: credpay
type: Opaque
stringData:
  OPENAI_ENDPOINT: "REPLACE_ME"       # e.g. https://<resource>.services.ai.azure.com/api/projects/<project>/openai/v1/responses
  OPENAI_KEY: "REPLACE_ME"
  OPENAI_DEPLOYMENT: "REPLACE_ME"
  OPENAI_API_VERSION: "2025-08-07"
  # --- Optional: only if enabling Azure Monitor / Log Analytics clients ---
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_SUBSCRIPTION_ID: ""
  LOG_ANALYTICS_WORKSPACE_ID: ""
  AKS_RESOURCE_ID: ""
