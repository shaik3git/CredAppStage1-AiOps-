# =====================================================================
# Payment Service (FastAPI / Python 3) - REST API on port 8000
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: credpay
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: credpay
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  strategy:
    type: RollingUpdate
    # maxSurge: 0 / maxUnavailable: 1 - terminates the old Pod before
    # starting the new one, so a rollout never needs headroom for a 3rd
    # Pod. Changed from maxSurge:1/maxUnavailable:0 after this cluster's
    # small, max-size node pool couldn't schedule the surge Pod (see
    # observability/prometheus/README.md "Resource footprint" note).
    # Tradeoff: briefly runs on 1 replica (not 2) during every rollout.
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: credpay
      annotations:
        # Picked up by Prometheus's existing "kubernetes-pods" scrape job
        # (observability/prometheus/01-prometheus-server/prometheus.yaml) -
        # that job has been wired up since Phase 1 but had 0 targets until now.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: payment-service
          # Images live in the existing ACR (credproj.azurecr.io). AKS is
          # attached to it via: az aks update --attach-acr credproj
          image: credpayacrs1.azurecr.io/credpay/payment-service:latest
          # "Always" because the tag is the mutable `:latest` - IfNotPresent
          # would let a node keep serving a stale cached image after a fresh
          # push + `kubectl rollout restart`.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: credpay-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: credpay-db
                  key: DB_PASSWORD
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
