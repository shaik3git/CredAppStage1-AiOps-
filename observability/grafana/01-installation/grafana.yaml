# =====================================================================
# Grafana - storage, deployment, service
# =====================================================================
# Reads metrics from Prometheus (already running in this namespace) -
# the datasource pointing at it is auto-provisioned by
# ../02-datasource/grafana-datasource.yaml, mounted in below, so nobody
# has to click through datasource setup manually.
#
# No readOnlyRootFilesystem here (unlike Prometheus/Node Exporter/
# kube-state-metrics): Grafana's image writes to more paths at runtime
# than just its data dir, and this repo already hit a real crash-loop
# once from being too aggressive with securityContext on an image that
# didn't tolerate it (see STAGE1-CHANGES.md §8) - not repeating that here
# without the ability to test it live.
# =====================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  strategy:
    type: Recreate # ReadWriteOnce PVC - only one Pod can mount it at a time
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472 # the "grafana" user built into the official image
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:11.3.1
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            # requests trimmed (limits unchanged) - see
            # observability/prometheus/README.md "Resource footprint" note.
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: grafana-data }
        - name: datasources
          configMap: { name: grafana-datasources }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP # no Ingress, no LoadBalancer - access via kubectl port-forward
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
