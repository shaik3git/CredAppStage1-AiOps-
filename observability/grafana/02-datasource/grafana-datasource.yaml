# =====================================================================
# Grafana datasource - auto-provisioned connection to Prometheus
# =====================================================================
# Grafana reads any file under /etc/grafana/provisioning/datasources/ on
# startup and configures it automatically - no manual "Add data source"
# click-through needed. Points at Prometheus's in-cluster Service DNS
# name (see observability/prometheus/01-prometheus-server/prometheus.yaml).
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
